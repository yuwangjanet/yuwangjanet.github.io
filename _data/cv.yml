  Experience:
    - role: PhD Researcher (HKPFS Fellow)
      organization: Hong Kong Polytechnic University
      location: Hong Kong
      period: "2023–Present"
      details:
        - Conduct research on embodied cognition, Theory of Mind, and perspective-taking in LLMs/MLLMs.
        - Developed MIRA (text-only) and DefQA (multimodal) benchmarks revealing systematic ToM failures (1.8–2.3% accuracy).
        - Provided cross-linguistic and cross-modal evidence of lacking self–other differentiation in AI; published in Nature HSSC, ACL 2026, LREC.

    - role: Visiting Scholar, AIR Lab (Robots Team)
      organization: University of Turin
      location: Turin, Italy
      period: "2026–Present"
      details:
        - Build real-world multimodal benchmarks for embodied cognition and ToM in VLMs.
        - Design robot-centered tasks requiring perspective-taking and grounded spatial reasoning.

    - role: Technical Advisor (AI & Robotics)
      organization: Startup Incubation Projects
      location: Hong Kong
      period: "2024–2026"
      details:
        - Directed technical roadmap of A.egg.I smart refrigerator assistant; contributed to HKSTP funding success.
        - Oversaw low-cost multi-source fusion navigation for embodied AI robots; supported Suzhou municipal grant acquisition.

  Projects:
    - title: "Deictic Expressions: Evaluating Embodied Cognition and Theory of Mind in LLMs"
      period: "2024–2026"
      details:
        - Identified confounds in existing ToM benchmarks and introduced deictic accessibility as a cognitively grounded alternative.
        - Built cross-linguistic and multimodal tasks showing LLMs/MLLMs default to egocentric perspectives.
        - Work published in Nature HSSC, ACL 2026, LREC 2026; presented internationally.

    - title: "Embodied Cognition and ToM for Human–Robot Collaborative Reference Resolution"
      period: "2026–Present"
      details:
        - Address challenges in human–robot reference resolution involving similar objects.
        - Designed collaborative manipulation tasks and VLM datasets requiring perspective-taking and deictic reasoning.
        - Exploring multi-agent inference integrating accessibility cues and embodied ToM.

